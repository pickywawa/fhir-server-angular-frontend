<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>HealthApp</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Application de gestion de santé et de patients en ligne">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" crossorigin="use-credentials">
  
  <!-- iOS App Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HealthApp">
  <meta name="apple-mobile-web-app-status-bar" content="default">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23667eea' width='180' height='180' rx='39'/><text x='90' y='90' dominant-baseline='middle' text-anchor='middle' font-size='96' font-weight='bold' fill='%23fff' font-family='system-ui'>H</text></svg>">
  
  <!-- Theme Color -->
  <meta name="theme-color" content="#ffffff">
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23667eea' width='100' height='100'/><text x='50' y='50' dominant-baseline='middle' text-anchor='middle' font-size='60' font-weight='bold' fill='%23fff' font-family='system-ui'>H</text></svg>">
</head>
<body>
  <app-root></app-root>
  
  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('[PWA] Service Worker registered:', registration);
          })
          .catch((error) => {
            console.error('[PWA] Service Worker registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
