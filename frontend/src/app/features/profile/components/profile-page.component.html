<app-module-shell [breadcrumbs]="breadcrumbs">
  <div class="profile-page">

    <app-bubble-card title="Mon compte">
      <div class="profile-hero">
        <div class="avatar-big">{{ auth.getUserInfo().avatarInitials }}</div>
        <div class="profile-identity">
          <h2>{{ auth.getUserInfo().fullName }}</h2>
          <span class="login-badge">{{ form.getRawValue().login || '—' }}</span>
        </div>
        @if (!editMode) {
          <button type="button" class="btn btn-edit" (click)="startEdit()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" aria-hidden="true">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
            Modifier
          </button>
        }
      </div>
    </app-bubble-card>

    <app-bubble-card title="Informations du compte">
      @if (loading) {
        <p class="loading-hint">Chargement des données Keycloak…</p>
      }

      <form [formGroup]="form" (ngSubmit)="save()" class="profile-form" autocomplete="off">
        <div class="form-grid">

          <div class="form-field">
            <label for="pf-login">Identifiant (login)</label>
            <input id="pf-login" formControlName="login" autocomplete="username" />
            <span class="field-hint">Non modifiable</span>
          </div>

          <div class="form-field">
            <label for="pf-first-name">Prénom</label>
            <input id="pf-first-name" formControlName="firstName" autocomplete="given-name" [class.editable]="editMode" />
          </div>

          <div class="form-field">
            <label for="pf-last-name">Nom</label>
            <input id="pf-last-name" formControlName="lastName" autocomplete="family-name" [class.editable]="editMode" />
          </div>

          <div class="form-field">
            <label for="pf-email">Adresse email</label>
            <input id="pf-email" type="email" formControlName="email" autocomplete="email" [class.editable]="editMode" />
          </div>

          <div class="form-field">
            <label for="pf-phone">Téléphone</label>
            <input id="pf-phone" type="tel" formControlName="phone" autocomplete="tel" [class.editable]="editMode" />
          </div>

          <div class="form-field">
            <label for="pf-practitioner">ID Praticien lié</label>
            <input id="pf-practitioner" formControlName="practitionerId" [class.editable]="editMode" />
            <span class="field-hint">Référence FHIR Practitioner</span>
          </div>

        </div>

        @if (editMode) {
          <div class="form-actions">
            <button type="button" class="btn btn-cancel" (click)="cancel()">Annuler</button>
            <button type="submit" class="btn btn-save" [disabled]="saving">
              @if (saving) {
                Enregistrement…
              } @else {
                Enregistrer sur Keycloak
              }
            </button>
          </div>
        }
      </form>
    </app-bubble-card>

  </div>
</app-module-shell>
