<div class="patient-form-container">
  <div class="form-header">
    <h2>Modifier le Patient</h2>
    <button class="btn-close" (click)="onCancel()">✕</button>
  </div>

  <form [formGroup]="patientForm" (ngSubmit)="onSubmit()" class="patient-form">
    <div class="form-section">
      <h3>Informations Personnelles</h3>

      <div class="form-row">
        <div class="form-group">
          <label for="firstName">Prénom *</label>
          <input
            id="firstName"
            type="text"
            formControlName="firstName"
            [class.invalid]="patientForm.get('firstName')?.invalid && patientForm.get('firstName')?.touched"
          />
          <div class="error" *ngIf="patientForm.get('firstName')?.invalid && patientForm.get('firstName')?.touched">
            Le prénom est requis
          </div>
        </div>

        <div class="form-group">
          <label for="lastName">Nom *</label>
          <input
            id="lastName"
            type="text"
            formControlName="lastName"
            [class.invalid]="patientForm.get('lastName')?.invalid && patientForm.get('lastName')?.touched"
          />
          <div class="error" *ngIf="patientForm.get('lastName')?.invalid && patientForm.get('lastName')?.touched">
            Le nom est requis
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="dateOfBirth">Date de Naissance *</label>
          <input
            id="dateOfBirth"
            type="date"
            formControlName="dateOfBirth"
            [class.invalid]="patientForm.get('dateOfBirth')?.invalid && patientForm.get('dateOfBirth')?.touched"
          />
          <div class="error" *ngIf="patientForm.get('dateOfBirth')?.invalid && patientForm.get('dateOfBirth')?.touched">
            La date de naissance est requise
          </div>
        </div>

        <div class="form-group">
          <label for="gender">Genre *</label>
          <select
            id="gender"
            formControlName="gender"
            [class.invalid]="patientForm.get('gender')?.invalid && patientForm.get('gender')?.touched"
          >
            <option value="">Sélectionnez...</option>
            <option value="male">Homme</option>
            <option value="female">Femme</option>
            <option value="other">Autre</option>
          </select>
          <div class="error" *ngIf="patientForm.get('gender')?.invalid && patientForm.get('gender')?.touched">
            Le genre est requis
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            [class.invalid]="patientForm.get('email')?.invalid && patientForm.get('email')?.touched"
          />
          <div class="error" *ngIf="patientForm.get('email')?.invalid && patientForm.get('email')?.touched">
            L'email doit être valide
          </div>
        </div>

        <div class="form-group">
          <label for="phone">Téléphone</label>
          <input
            id="phone"
            type="tel"
            formControlName="phone"
          />
        </div>
      </div>
    </div>

    <div class="form-section" formGroupName="address">
      <h3>Adresse</h3>

      <div class="form-group">
        <label for="street">Rue</label>
        <input
          id="street"
          type="text"
          formControlName="street"
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="city">Ville</label>
          <input
            id="city"
            type="text"
            formControlName="city"
          />
        </div>

        <div class="form-group">
          <label for="state">État/Région</label>
          <input
            id="state"
            type="text"
            formControlName="state"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="zipCode">Code Postal</label>
          <input
            id="zipCode"
            type="text"
            formControlName="zipCode"
          />
        </div>

        <div class="form-group">
          <label for="country">Pays</label>
          <input
            id="country"
            type="text"
            formControlName="country"
          />
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button
        type="button"
        class="btn btn-cancel"
        (click)="onCancel()"
      >
        Annuler
      </button>
      <button
        type="submit"
        class="btn btn-submit"
        [disabled]="patientForm.invalid || (loading$ | async)"
      >
        {{ (loading$ | async) ? 'Enregistrement...' : 'Enregistrer' }}
      </button>
    </div>
  </form>
</div>
