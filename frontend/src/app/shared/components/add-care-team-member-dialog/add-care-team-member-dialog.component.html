<div class="dialog-overlay" (click)="cancelDialog()">
  <div class="dialog-container" (click)="$event.stopPropagation()">
    <div class="dialog-header">
      <h2>Ajouter un intervenant</h2>
      <button type="button" class="close-btn" (click)="cancelDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <form [formGroup]="form" class="dialog-form">
      <div class="form-group">
        <label for="search">Rechercher un intervenant</label>
        <div class="search-input-wrapper">
          <input
            id="search"
            type="text"
            formControlName="search"
            placeholder="Tapez le nom ou prénom..."
            class="form-control search-input"
            autocomplete="off"
            />
          @if (searchLoading) {
            <span class="spinner"></span>
          }

          @if (showDropdown && filteredPractitioners.length > 0) {
            <div class="dropdown">
              @for (practitioner of filteredPractitioners; track practitioner) {
                <button
                  type="button"
                  class="dropdown-item"
                  [class.selected]="selectedPractitioner?.id === practitioner.id"
                  (click)="selectPractitioner(practitioner)"
                  >
                  <span class="name">{{ practitioner.displayName }}</span>
                </button>
              }
            </div>
          }
        </div>

        @if (showNoPractitionerFound) {
          <div class="error-message">
            Aucun professionnel trouve.
          </div>
        }

        @if (searchError) {
          <div class="error-message">
            {{ searchError }}
          </div>
        }
      </div>

      <div class="form-group">
        <label for="role">Rôle de l'intervenant</label>
        <select id="role" formControlName="role" class="form-control">
          @for (role of participantRoles; track role) {
            <option [value]="role.code">
              {{ role.display }}
            </option>
          }
        </select>
      </div>

    </form>

    <div class="dialog-footer">
      <button type="button" class="btn btn-secondary" (click)="cancelDialog()">Annuler</button>
      <app-button-primary
        class="dialog-primary-action"
        type="button"
        [disabled]="!selectedPractitioner || form.invalid"
        (click)="submit()"
        >
        Ajouter
      </app-button-primary>
    </div>
  </div>
</div>
